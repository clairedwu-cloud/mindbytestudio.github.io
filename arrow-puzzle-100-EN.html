<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Puzzle · 100 Levels</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131f;
    --border: #1e1e30;
    --accent: #00f5a0;
    --accent2: #f5a000;
    --danger: #f54060;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --cell: #1a1a2e;
    --cell-hover: #202040;
    --cell-size: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,245,160,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(245,160,0,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .screen { width: 100%; max-width: 520px; position: relative; z-index: 1; }

  /* ── LEVEL SELECT SCREEN ── */
  #screenSelect { display: flex; flex-direction: column; gap: 20px; align-items: center; }

  .logo { text-align: center; margin-bottom: 4px; }
  .logo h1 {
    font-family: 'Syne', sans-serif; font-size: 2.8rem; font-weight: 900;
    letter-spacing: -2px; line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo p { font-size: 0.65rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }

  .chapter {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .chapter-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chapter-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .chapter-title { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
  .chapter-sub { font-size: 0.6rem; color: var(--muted); margin-left: auto; }

  .level-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 0;
  }
  .lvl-btn {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.12s;
    position: relative;
    color: var(--muted);
  }
  .lvl-btn:hover { background: var(--cell-hover); color: var(--text); z-index: 1; }
  .lvl-btn.completed { color: var(--accent); }
  .lvl-btn.completed::after {
    content: '✓';
    position: absolute;
    top: 2px; right: 3px;
    font-size: 0.45rem;
    color: var(--accent);
  }
  .lvl-btn.current { color: var(--accent2); border-color: var(--accent2); }

  /* ── GAME SCREEN ── */
  #screenGame { display: none; flex-direction: column; gap: 16px; align-items: center; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
  }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 8px;
    font-family: 'Space Mono', monospace; font-size: 0.7rem;
    cursor: pointer; transition: all 0.12s;
  }
  .back-btn:hover { border-color: var(--muted); }

  .level-info { text-align: center; }
  .level-num {
    font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .level-tag { font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; }

  .info-bar {
    display: flex; gap: 10px; width: 100%;
  }
  .info-box {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 10px; text-align: center;
  }
  .info-label { font-size: 0.55rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .info-value { font-size: 1.2rem; font-weight: 700; color: var(--accent); margin-top: 2px; }

  .target-box {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 10px;
    padding: 10px 14px; font-size: 0.72rem; color: var(--muted);
    display: flex; align-items: center; gap: 10px;
  }
  .target-arrow { font-size: 1.6rem; }
  .target-text strong { color: var(--accent); }

  .grid-wrap { overflow-x: auto; width: 100%; display: flex; justify-content: center; }
  .grid {
    display: grid; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px;
  }
  .cell {
    width: var(--cell-size); height: var(--cell-size);
    background: var(--cell); border: 2px solid var(--border);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.6rem; transition: all 0.12s;
    user-select: none; position: relative;
  }
  .cell:hover:not(.fixed):not(.header-cell) { background: var(--cell-hover); border-color: var(--muted); transform: scale(1.05); }
  .cell.fixed { cursor: default; background: #0d1a12; border-color: rgba(0,245,160,0.3); }
  .cell.fixed .a-icon { color: var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
  .cell.user-placed .a-icon { color: var(--accent2); }
  .cell.correct { border-color: var(--accent); background: #0a1f12; animation: pop 0.35s ease; }
  .cell.wrong { border-color: var(--danger); background: #1f0a0e; animation: shake 0.3s ease; }
  .cell.sel { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(245,160,0,0.25); }
  .cell.header-cell {
    cursor: default; background: transparent; border: none;
    font-size: 0.85rem; font-weight: 700; color: var(--accent);
  }
  .a-icon { font-size: 1.8rem; line-height: 1; }

  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

  .dir-picker {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; width: 100%;
  }
  .dir-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
  .dir-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .dir-btn {
    background: var(--cell); border: 2px solid var(--border);
    border-radius: 8px; height: 48px; display: flex; align-items: center;
    justify-content: center; font-size: 1.5rem; cursor: pointer; transition: all 0.12s;
  }
  .dir-btn:hover { border-color: var(--accent2); background: var(--cell-hover); }
  .dir-btn.sel { border-color: var(--accent2); background: rgba(245,160,0,0.1); }

  .btn-row { display: flex; gap: 8px; width: 100%; }
  .btn {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    font-family: 'Space Mono', monospace; font-size: 0.7rem;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.12s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00ffaa; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,245,160,0.3); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--muted); transform: translateY(-1px); }

  /* ── WIN OVERLAY ── */
  .win-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; text-align: center; padding: 40px;
  }
  .win-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
  .win-title {
    font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .win-sub { color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; }
  .win-stats { color: var(--text); font-size: 0.8rem; }
  .win-btns { display: flex; gap: 10px; margin-top: 8px; }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
</style>
</head>
<body>

<!-- ── Level Select Screen ── -->
<div id="screenSelect" class="screen">
  <div class="logo">
    <h1>ARROW</h1>
    <p>100 Levels Puzzle</p>
  </div>
  <!-- chapters rendered by JS -->
</div>

<!-- ── Game Screen ── -->
<div id="screenGame" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showSelect()">← Levels</button>
    <div class="level-info">
      <div class="level-num" id="lvlNum">Level 1</div>
      <div class="level-tag" id="lvlTag">Beginner</div>
    </div>
    <button class="btn-secondary btn" style="flex:0;padding:8px 14px;font-size:0.65rem" onclick="resetLevel()">↺</button>
  </div>

  <div class="info-bar">
    <div class="info-box"><div class="info-label">Moves</div><div class="info-value" id="movesVal">0</div></div>
    <div class="info-box"><div class="info-label">Left</div><div class="info-value" id="remainVal">—</div></div>
    <div class="info-box"><div class="info-label">Target</div><div class="info-value" id="targetVal">→</div></div>
  </div>

  <div class="target-box">
    <span class="target-arrow" id="targetArrow">→</span>
    <span class="target-text">All arrows must point <strong id="targetName">Right</strong> · match row &amp; col counts</span>
  </div>

  <div class="grid-wrap"><div class="grid" id="grid"></div></div>

  <div class="dir-picker">
    <div class="dir-label">Pick Direction</div>
    <div class="dir-grid" id="dirGrid"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="checkSolution()">✓ Check</button>
    <button class="btn btn-secondary" onclick="resetLevel()">↺ Reset</button>
    <button class="btn btn-secondary" onclick="nextLevel()">→ Next</button>
  </div>
</div>

<!-- Win overlay -->
<div class="win-overlay" id="winOverlay">
  <div style="font-size:2.5rem">⭐⭐⭐</div>
  <div class="win-title">PERFECT!</div>
  <div class="win-sub">Level Complete</div>
  <div class="win-stats" id="winStats"></div>
  <div class="win-btns">
    <button class="btn btn-secondary" onclick="showSelect()">All Levels</button>
    <button class="btn btn-primary" onclick="nextLevel()">Next Level →</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// DIRECTIONS
// ══════════════════════════════════════════════════════════
const DIRS = [
  {icon:'↑',name:'up',zh:'Up'},
  {icon:'↗',name:'ur',zh:'Up-Right'},
  {icon:'→',name:'right',zh:'Right'},
  {icon:'↘',name:'dr',zh:'Down-Right'},
  {icon:'↓',name:'down',zh:'Down'},
  {icon:'↙',name:'dl',zh:'Down-Left'},
  {icon:'←',name:'left',zh:'Left'},
  {icon:'↖',name:'ul',zh:'Up-Left'},
];
const DIR_MAP = {};
DIRS.forEach(d => DIR_MAP[d.name] = d);

// ══════════════════════════════════════════════════════════
// LEVEL GENERATION
// ══════════════════════════════════════════════════════════
// We'll procedurally generate 100 levels with increasing difficulty.
// Each level: { size, targetDir, rowCounts, colCounts, fixed[] }
// Strategy: randomly place arrows, compute row/col counts, pick some as "fixed"

function seededRand(seed) {
  // simple LCG
  let s = seed;
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function makeDirName(idx) { return DIRS[idx % 8].name; }

function generateLevel(lvlIndex) {
  const rand = seededRand(lvlIndex * 7919 + 31337);

  // Difficulty tiers
  let size, fixedCount, allowDiag;
  if (lvlIndex < 10) {
    size = 3; fixedCount = 3; allowDiag = false;
  } else if (lvlIndex < 20) {
    size = 3; fixedCount = 2; allowDiag = false;
  } else if (lvlIndex < 35) {
    size = 4; fixedCount = 4; allowDiag = false;
  } else if (lvlIndex < 50) {
    size = 4; fixedCount = 3; allowDiag = true;
  } else if (lvlIndex < 65) {
    size = 5; fixedCount = 5; allowDiag = true;
  } else if (lvlIndex < 80) {
    size = 5; fixedCount = 4; allowDiag = true;
  } else if (lvlIndex < 90) {
    size = 6; fixedCount = 6; allowDiag = true;
  } else {
    size = 6; fixedCount = 4; allowDiag = true;
  }

  const dirPool = allowDiag ? DIRS : DIRS.filter(d => ['up','right','down','left'].includes(d.name));
  const targetDir = dirPool[Math.floor(rand() * dirPool.length)].name;

  // Build solution grid: each cell has targetDir
  // Row/col counts: decide how many per row/col (1 to size, balanced)
  // Simple approach: random counts that sum consistently
  const n = size;
  
  // Generate a valid placement: assign some cells to have arrows (all = targetDir)
  // Use a random binary matrix with row/col sums matching
  // Simple: just pick random cells, count them
  let grid = Array.from({length:n}, () => Array(n).fill(false));
  
  // Random row targets (1 to n-1 each, at least 1)
  const rowCounts = Array.from({length:n}, () => Math.max(1, Math.floor(rand() * (n-1)) + 1));
  // Compute col counts from actual placement
  // Use a greedy approach
  grid = Array.from({length:n}, () => Array(n).fill(false));
  for (let r = 0; r < n; r++) {
    let slots = Array.from({length:n}, (_,i)=>i);
    // shuffle
    for (let i = slots.length-1; i > 0; i--) {
      const j = Math.floor(rand() * (i+1));
      [slots[i], slots[j]] = [slots[j], slots[i]];
    }
    const cnt = rowCounts[r];
    for (let k = 0; k < cnt; k++) grid[r][slots[k]] = true;
  }
  const colCounts = Array.from({length:n}, (_,c) => {
    let cnt = 0;
    for (let r = 0; r < n; r++) if (grid[r][c]) cnt++;
    return cnt;
  });

  // Pick fixed cells: randomly among occupied cells
  const occupied = [];
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      if (grid[r][c]) occupied.push([r,c]);
  
  // shuffle occupied
  for (let i = occupied.length-1; i > 0; i--) {
    const j = Math.floor(rand() * (i+1));
    [occupied[i], occupied[j]] = [occupied[j], occupied[i]];
  }
  
  const actualFixed = Math.min(fixedCount, occupied.length);
  const fixed = occupied.slice(0, actualFixed).map(([r,c]) => [r,c,targetDir]);

  return { size: n, targetDir, rowCounts, colCounts, fixed, solution: grid };
}

// Generate all 100 levels
const LEVELS = Array.from({length:100}, (_,i) => generateLevel(i));

// Difficulty labels
function diffLabel(i) {
  if (i < 10) return 'Beginner';
  if (i < 20) return 'Easy';
  if (i < 35) return 'Normal';
  if (i < 50) return 'Medium';
  if (i < 65) return 'Hard';
  if (i < 80) return 'Expert';
  if (i < 90) return 'Master';
  return 'Legend';
}

// Chapter config
const CHAPTERS = [
  { name: 'BEGINNER', color: '#00f5a0', range: [0,9] },
  { name: 'EASY', color: '#00c8f5', range: [10,19] },
  { name: 'NORMAL', color: '#8af500', range: [20,34] },
  { name: 'MEDIUM', color: '#f5e000', range: [35,49] },
  { name: 'HARD', color: '#f5a000', range: [50,64] },
  { name: 'EXPERT', color: '#f56000', range: [65,79] },
  { name: 'MASTER', color: '#f52060', range: [80,89] },
  { name: 'LEGEND', color: '#c020f5', range: [90,99] },
];

// ══════════════════════════════════════════════════════════
// SAVE/LOAD (localStorage)
// ══════════════════════════════════════════════════════════
function getSave() {
  try { return JSON.parse(localStorage.getItem('arrowPuzzleSave') || '{}'); } catch { return {}; }
}
function setSave(data) {
  try { localStorage.setItem('arrowPuzzleSave', JSON.stringify(data)); } catch {}
}
function markComplete(lvl) {
  const s = getSave(); s[lvl] = true; setSave(s);
}
function isComplete(lvl) { return !!getSave()[lvl]; }

// ══════════════════════════════════════════════════════════
// LEVEL SELECT
// ══════════════════════════════════════════════════════════
function showSelect() {
  document.getElementById('screenSelect').style.display = 'flex';
  document.getElementById('screenGame').style.display = 'none';
  document.getElementById('winOverlay').classList.remove('show');
  renderSelect();
}

function renderSelect() {
  const sel = document.getElementById('screenSelect');
  // Remove old chapters
  Array.from(sel.querySelectorAll('.chapter')).forEach(el => el.remove());

  CHAPTERS.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'chapter';

    const header = document.createElement('div');
    header.className = 'chapter-header';
    const dot = document.createElement('div');
    dot.className = 'chapter-dot';
    dot.style.background = ch.color;
    const title = document.createElement('div');
    title.className = 'chapter-title';
    title.style.color = ch.color;
    title.textContent = ch.name;
    const sub = document.createElement('div');
    sub.className = 'chapter-sub';
    const [s,e] = ch.range;
    let done = 0;
    for (let i=s;i<=e;i++) if (isComplete(i)) done++;
    sub.textContent = `${done}/${e-s+1}`;
    header.append(dot, title, sub);
    div.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'level-grid';
    for (let i = ch.range[0]; i <= ch.range[1]; i++) {
      const btn = document.createElement('div');
      btn.className = 'lvl-btn';
      if (isComplete(i)) btn.classList.add('completed');
      btn.textContent = i + 1;
      btn.addEventListener('click', () => startLevel(i));
      grid.appendChild(btn);
    }
    div.appendChild(grid);
    sel.appendChild(div);
  });
}

// ══════════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════════
let curLvlIdx = 0;
let levelData = null;
let gridState = [];
let selectedCell = null;
let selectedDir = null;
let moves = 0;

function startLevel(idx) {
  curLvlIdx = idx;
  levelData = LEVELS[idx];
  moves = 0;
  selectedCell = null;
  selectedDir = null;

  const n = levelData.size;
  gridState = Array.from({length:n}, () => Array.from({length:n}, () => ({dir: null, fixed: false})));
  for (const [r,c,d] of levelData.fixed) {
    gridState[r][c] = {dir: d, fixed: true};
  }

  document.getElementById('screenSelect').style.display = 'none';
  document.getElementById('screenGame').style.display = 'flex';
  document.getElementById('winOverlay').classList.remove('show');

  document.getElementById('lvlNum').textContent = `Level ${idx+1}`;
  document.getElementById('lvlTag').textContent = diffLabel(idx);

  const td = DIR_MAP[levelData.targetDir];
  document.getElementById('targetVal').textContent = td.icon;
  document.getElementById('targetArrow').textContent = td.icon;
  document.getElementById('targetName').textContent = td.zh;

  renderGrid();
  renderDirPicker();
  updateInfo();
}

function resetLevel() { startLevel(curLvlIdx); }
function nextLevel() { startLevel((curLvlIdx + 1) % 100); }

// ══════════════════════════════════════════════════════════
// RENDER GRID
// ══════════════════════════════════════════════════════════
function renderGrid() {
  const n = levelData.size;
  const el = document.getElementById('grid');
  // Adjust cell size for large grids
  const cs = n <= 4 ? 64 : n === 5 ? 56 : 48;
  document.documentElement.style.setProperty('--cell-size', cs + 'px');

  el.style.gridTemplateColumns = `repeat(${n+1}, ${cs}px)`;
  el.innerHTML = '';

  for (let r = 0; r <= n; r++) {
    for (let c = 0; c <= n; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (r === n && c === n) {
        // corner
        cell.classList.add('header-cell');
      } else if (r === n) {
        // col count
        cell.classList.add('header-cell');
        cell.textContent = levelData.colCounts[c];
      } else if (c === n) {
        // row count
        cell.classList.add('header-cell');
        cell.textContent = levelData.rowCounts[r];
      } else {
        const cd = gridState[r][c];
        if (cd.fixed) cell.classList.add('fixed');
        const span = document.createElement('span');
        span.className = 'a-icon';
        if (cd.dir) {
          span.textContent = DIR_MAP[cd.dir].icon;
          if (!cd.fixed) cell.classList.add('user-placed');
        }
        cell.appendChild(span);

        if (!cd.fixed) {
          cell.addEventListener('click', () => onCellClick(r, c));
        }
        cell.dataset.r = r; cell.dataset.c = c;

        if (selectedCell && selectedCell[0]===r && selectedCell[1]===c) {
          cell.classList.add('sel');
        }
      }
      el.appendChild(cell);
    }
  }
}

function onCellClick(r, c) {
  if (gridState[r][c].fixed) return;
  if (selectedDir !== null) {
    placeArrow(r, c, selectedDir);
    return;
  }
  selectedCell = [r, c];
  renderGrid();
}

function placeArrow(r, c, dirName) {
  if (gridState[r][c].fixed) return;
  if (gridState[r][c].dir === dirName) {
    gridState[r][c].dir = null;
  } else {
    gridState[r][c].dir = dirName;
    moves++;
  }
  selectedCell = null;
  updateInfo();
  renderGrid();
}

// ══════════════════════════════════════════════════════════
// DIR PICKER
// ══════════════════════════════════════════════════════════
function renderDirPicker() {
  const el = document.getElementById('dirGrid');
  el.innerHTML = '';
  DIRS.forEach(d => {
    const btn = document.createElement('div');
    btn.className = 'dir-btn';
    if (selectedDir === d.name) btn.classList.add('sel');
    btn.textContent = d.icon;
    btn.addEventListener('click', () => {
      if (selectedDir === d.name) {
        selectedDir = null;
      } else {
        selectedDir = d.name;
        if (selectedCell) {
          const [r,c] = selectedCell;
          placeArrow(r, c, selectedDir);
          selectedCell = null;
          selectedDir = null;
        }
      }
      renderDirPicker();
    });
    el.appendChild(btn);
  });
}

// ══════════════════════════════════════════════════════════
// INFO BAR
// ══════════════════════════════════════════════════════════
function updateInfo() {
  document.getElementById('movesVal').textContent = moves;
  const n = levelData.size;
  let empty = 0;
  const totalExpected = levelData.rowCounts.reduce((a,b)=>a+b,0);
  let placed = 0;
  for (let r=0;r<n;r++) for (let c=0;c<n;c++) if (gridState[r][c].dir) placed++;
  document.getElementById('remainVal').textContent = totalExpected - placed;
}

// ══════════════════════════════════════════════════════════
// CHECK SOLUTION
// ══════════════════════════════════════════════════════════
function checkSolution() {
  const n = levelData.size;
  const target = levelData.targetDir;
  let ok = true;

  // All arrows must be target dir
  for (let r=0;r<n;r++) for (let c=0;c<n;c++) {
    const d = gridState[r][c].dir;
    if (d && d !== target) ok = false;
  }

  // Row counts
  for (let r=0;r<n;r++) {
    let cnt = 0;
    for (let c=0;c<n;c++) if (gridState[r][c].dir) cnt++;
    if (cnt !== levelData.rowCounts[r]) ok = false;
  }

  // Col counts
  for (let c=0;c<n;c++) {
    let cnt = 0;
    for (let r=0;r<n;r++) if (gridState[r][c].dir) cnt++;
    if (cnt !== levelData.colCounts[c]) ok = false;
  }

  // Total placed = expected
  const totalExpected = levelData.rowCounts.reduce((a,b)=>a+b,0);
  let placed = 0;
  for (let r=0;r<n;r++) for (let c=0;c<n;c++) if (gridState[r][c].dir) placed++;
  if (placed !== totalExpected) ok = false;

  if (ok) {
    markComplete(curLvlIdx);
    document.getElementById('winStats').textContent = `Level ${curLvlIdx+1} completed in ${moves} moves`;
    document.getElementById('winOverlay').classList.add('show');
  } else {
    flashWrong();
  }
}

function flashWrong() {
  const n = levelData.size;
  const target = levelData.targetDir;
  const cells = document.getElementById('grid').querySelectorAll('.cell');
  for (let r=0;r<n;r++) for (let c=0;c<n;c++) {
    const d = gridState[r][c].dir;
    if (d && d !== target) {
      const idx = r*(n+1)+c;
      cells[idx]?.classList.add('wrong');
      setTimeout(()=>cells[idx]?.classList.remove('wrong'), 400);
    }
  }
}

// ══════════════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════════════
showSelect();
</script>
